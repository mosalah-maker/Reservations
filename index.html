<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز شراء السماعات</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-full mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">حجز شراء أجهزة</h1>
            <p class="text-gray-600 mt-2">املأ النموذج التالي لإتمام حجزك</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8">
            <form id="reservationForm" class="space-y-5">
                <!-- Name -->
                <div>
                    <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">
                        الاسم <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                        placeholder="أدخل اسمك الكامل"
                    >
                </div>

                <!-- Phone -->
                <div>
                    <label for="phone" class="block text-sm font-semibold text-gray-700 mb-2">
                        رقم التليفون <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                        placeholder="01xxxxxxxxx"
                    >
                </div>

                <!-- Address -->
                <div>
                    <label for="address" class="block text-sm font-semibold text-gray-700 mb-2">
                        العنوان <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="address" 
                        name="address" 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                        placeholder="أدخل عنوانك بالتفصيل"
                    >
                </div>

                <!-- Device Type -->
                <div>
                    <label for="device" class="block text-sm font-semibold text-gray-700 mb-2">
                        نوع الجهاز <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="device" 
                        name="device" 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                        placeholder="مثال :الميني المعدله 
                        او الميني العاديه  "
                    >
                </div>

                <!-- Question -->
                <div>
                    <label for="question" class="block text-sm font-semibold text-gray-700 mb-2">
                        استفسار <span class="text-gray-400 font-normal">(اختياري)</span>
                    </label>
                    <textarea 
                        id="question" 
                        name="question" 
                        rows="3"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none resize-none"
                        placeholder="اكتب استفسارك أو ملاحظاتك هنا..."
                    ></textarea>
                </div>

                <!-- Delivery Date -->
                <div>
                    <label for="delivery_date" class="block text-sm font-semibold text-gray-700 mb-2">
                        ميعاد التسليم <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="date" 
                        id="delivery_date" 
                        name="delivery_date" 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                    >
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg hover:shadow-xl flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span>احجز الآن</span>
                </button>
            </form>

            <!-- Success Message -->
            <div id="successMessage" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-xl">
                <div class="flex items-center gap-3">
                    <div class="flex-shrink-0">
                        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="font-bold text-green-800">تم حفظ الحجز بنجاح</p>
                        <p class="text-green-600 text-sm">سيتم تحويلك للواتساب...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-6">
            جميع الحقوق محفوظة © 2024
        </p>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-gray-700 font-semibold">جاري حفظ الحجز...</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDrhyNCKO5tzF-tiRQevk12kLM8hAkkr0w",
            authDomain: "reservations-e411a.firebaseapp.com",
            projectId: "reservations-e411a",
            storageBucket: "reservations-e411a.firebasestorage.app",
            messagingSenderId: "197134642642",
            appId: "1:197134642642:web:a112f2cbf9dc64d0096c0b",
            measurementId: "G-R0MVFWBG53"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('delivery_date').setAttribute('min', today);

        // Form submission
        const form = document.getElementById('reservationForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form data
            const formData = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                address: document.getElementById('address').value.trim(),
                device: document.getElementById('device').value.trim(),
                question: document.getElementById('question').value.trim(),
                delivery_date: document.getElementById('delivery_date').value,
                created_at: serverTimestamp()
            };

            // Show loading
            loadingOverlay.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                // Save to Firestore
                await addDoc(collection(db, "reservations"), formData);

                // Hide loading
                loadingOverlay.classList.add('hidden');

                // Show success message
                successMessage.classList.remove('hidden');

                // Prepare WhatsApp message
                const whatsappNumber = "201282235324"; // رقم الواتساب الأساسي
                const message = `🛒 *طلب حجز جديد*

📛 *الاسم:* ${formData.name}
📞 *التليفون:* ${formData.phone}
📍 *العنوان:* ${formData.address}
📱 *نوع الجهاز:* ${formData.device}
📅 *ميعاد التسليم:* ${formData.delivery_date}
${formData.question ? `❓ *استفسار:* ${formData.question}` : ''}

✅ تم إرسال الطلب بنجاح`;

                const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

                // Reset form
                form.reset();

                // Open WhatsApp after 1.5 seconds
                setTimeout(() => {
                    window.open(whatsappURL, '_blank');
                }, 1500);

            } catch (error) {
                console.error("Error adding document: ", error);
                loadingOverlay.classList.add('hidden');
                alert('حدث خطأ أثناء حفظ الحجز. يرجى المحاولة مرة أخرى.');
            } finally {
                submitBtn.disabled = false;
            }
        });

        // Hide success message when user starts typing again
        const inputs = form.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                successMessage.classList.add('hidden');
            });
        });
    </script>
</body>
</html>
